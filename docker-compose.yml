services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storycards}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storycards}
      POSTGRES_DB: ${POSTGRES_DB:-storycards}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storycards}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ${DOCKERHUB_USERNAME:-hexadecim8}/storycards:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "80:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-storycards}:${POSTGRES_PASSWORD:-storycards}@db:5432/${POSTGRES_DB:-storycards}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
